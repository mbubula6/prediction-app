{% extends 'base.html' %}
{% block content %}
<div class="glass-panel main-panel">
    <div class="header">
        <h1>Create <span>Account</span></h1>
        <p>Save your habits and unlock personalized ML models.</p>
    </div>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary-btn" style="margin-top: 1rem;">Register</button>
    </form>
    <p style="margin-top: 1rem; text-align: center; color: var(--text-secondary);">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-1);">Log in here</a>
    </p>
</div>
{% endblock %}
