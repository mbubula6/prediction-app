<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavioral Prediction AI</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body x-data="{ lightMode: localStorage.getItem('theme') === 'light' }" 
      x-init="$watch('lightMode', val => localStorage.setItem('theme', val ? 'light' : 'dark'))"
      :class="{ 'light-mode': lightMode }">
    
    <button @click="lightMode = !lightMode" class="theme-toggle">
        <span x-show="!lightMode">☀️ Light Mode</span>
        <span x-show="lightMode" style="display:none;">🌙 Dark Mode</span>
    </button>
    
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
