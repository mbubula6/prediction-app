<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavioral Prediction AI</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}?v=1.2">
</head>
<body x-data="{ lightMode: localStorage.getItem('theme') === 'light' }" 
      x-init="$watch('lightMode', val => localStorage.setItem('theme', val ? 'light' : 'dark'))"
      :class="{ 'light-mode': lightMode }">
    
    <nav class="nav-bar">
        <div class="nav-brand">🧠 BehavioGraph</div>
        <div class="nav-links">
            <button @click="lightMode = !lightMode" class="theme-toggle">
                <span x-show="!lightMode">☀️ Light Mode</span>
                <span x-show="lightMode" style="display:none;">🌙 Dark Mode</span>
            </button>
            {% if user.is_authenticated %}
                <a href="{% url 'index' %}">Predict</a>
                <a href="{% url 'history' %}">History</a>
                <a href="{% url 'logout' %}" class="logout-link">Logout ({{ user.username }})</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>
    
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
